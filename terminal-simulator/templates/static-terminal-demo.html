<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Terminal Simulator Demo</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #1c1917;
      --fg: #e7e5e4;
      --muted: #a8a29e;
      --border: #44403c;
      --prompt: #fbbf24;
    }

    body {
      margin: 0;
      padding: 24px;
      background: #0c0a09;
      color: var(--fg);
      font-family: Inter, system-ui, sans-serif;
    }

    .terminal {
      max-width: 880px;
      margin: 0 auto;
      border: 1px solid var(--border);
      border-radius: 16px;
      overflow: hidden;
      background: var(--bg);
    }

    .header,
    .footer {
      padding: 12px 16px;
      background: #171412;
      border-bottom: 1px solid var(--border);
    }

    .footer {
      border-bottom: 0;
      border-top: 1px solid var(--border);
      color: var(--muted);
      font-size: 14px;
    }

    .body {
      padding: 16px;
      min-height: 280px;
      font: 14px/1.6 ui-monospace, SFMono-Regular, Consolas, monospace;
    }

    .toolbar {
      max-width: 880px;
      margin: 0 auto 12px;
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    .chip {
      border: 1px solid var(--border);
      background: #171412;
      color: var(--fg);
      border-radius: 999px;
      padding: 8px 12px;
      font-size: 13px;
    }

    .command::before {
      content: ">";
      color: var(--prompt);
      margin-right: 8px;
    }

    pre {
      white-space: pre-wrap;
      word-break: break-word;
      margin: 0 0 12px;
    }

    @media (max-width: 640px) {
      body {
        padding: 12px;
      }

      .body {
        min-height: 220px;
        font-size: 13px;
      }
    }

    @media (prefers-reduced-motion: reduce) {
      * {
        scroll-behavior: auto;
      }
    }
  </style>
</head>
<body>
  <div class="toolbar" aria-label="Platform examples">
    <span class="chip">Windows: PowerShell</span>
    <span class="chip">Windows: CMD</span>
    <span class="chip">macOS/Linux: Bash or Zsh</span>
    <span class="chip">Mobile-safe wrapping</span>
  </div>
  <section class="terminal" aria-label="Terminal simulator demo">
    <div class="header">Quick Start</div>
    <div class="body">
      <pre class="command">npx create-next-app@latest demo-site</pre>
      <pre>Success! Created demo-site</pre>
      <pre class="command">cd demo-site && npm run dev</pre>
      <pre>Local: http://localhost:3000</pre>
    </div>
    <div class="footer">Replace command text with PowerShell, CMD, Bash, or Zsh variants as needed.</div>
  </section>
</body>
</html>
