<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Terminal Learning Kit - React 基础示例</title>
  
  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  
  <!-- React -->
  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  
  <!-- 主题样式 -->
  <link rel="stylesheet" href="../themes/macos-dark.css">
  
  <style>
    body {
      background: #0c0a09;
      color: #e7e5e4;
    }
  </style>
</head>
<body class="min-h-screen">
  <div id="root"></div>

  <script type="text/babel">
    // 模拟核心库（实际使用时从 npm 包导入）
    const { useState, useEffect, useRef, useCallback } = React;

    // ==================== TypeWriter 组件 ====================
    class TypeWriterCore {
      constructor(options) {
        this.text = options.text;
        this.speed = options.speed ?? 30;
        this.enabled = options.enabled ?? true;
        this.onComplete = options.onComplete;
        this.onChar = options.onChar;
        this.charIndex = 0;
        this.rafId = null;
        this.lastTime = 0;
        this.isRunning = false;
        this.state = {
          displayedText: this.enabled ? '' : this.text,
          isTyping: false,
          progress: this.enabled ? 0 : 1
        };
        this.listeners = new Set();
      }

      start() {
        if (this.isRunning || !this.enabled) return;
        this.isRunning = true;
        this.charIndex = 0;
        this.lastTime = 0;
        this.updateState({ displayedText: '', isTyping: true, progress: 0 });
        this.rafId = requestAnimationFrame((t) => this.animate(t));
      }

      stop() {
        if (this.rafId !== null) {
          cancelAnimationFrame(this.rafId);
          this.rafId = null;
        }
        this.isRunning = false;
        this.updateState({ ...this.state, isTyping: false });
      }

      skipToEnd() {
        this.stop();
        this.charIndex = this.text.length;
        this.updateState({ displayedText: this.text, isTyping: false, progress: 1 });
        this.onComplete?.();
      }

      updateState(newState) {
        this.state = newState;
        this.listeners.forEach(l => l(newState));
      }

      subscribe(listener) {
        this.listeners.add(listener);
        return () => this.listeners.delete(listener);
      }

      destroy() {
        this.stop();
        this.listeners.clear();
      }

      animate(timestamp) {
        if (!this.lastTime) this.lastTime = timestamp;
        const elapsed = timestamp - this.lastTime;
        
        if (elapsed >= this.speed) {
          this.lastTime = timestamp;
          this.charIndex++;
          const displayedText = this.text.slice(0, this.charIndex);
          const progress = this.charIndex / this.text.length;
          this.updateState({ displayedText, isTyping: true, progress });
          
          if (this.onChar && this.charIndex <= this.text.length) {
            this.onChar(this.text[this.charIndex - 1], this.charIndex - 1);
          }
          
          if (this.charIndex >= this.text.length) {
            this.isRunning = false;
            this.updateState({ displayedText: this.text, isTyping: false, progress: 1 });
            this.onComplete?.();
            return;
          }
        }
        this.rafId = requestAnimationFrame((t) => this.animate(t));
      }
    }

    const TypeWriter = ({ text, speed = 30, cursor = true, onComplete }) => {
      const [displayedText, setDisplayedText] = useState('');
      const [isTyping, setIsTyping] = useState(false);
      const typeWriterRef = useRef(null);

      useEffect(() => {
        typeWriterRef.current = new TypeWriterCore({
          text,
          speed,
          enabled: true,
          onComplete
        });

        const unsubscribe = typeWriterRef.current.subscribe((state) => {
          setDisplayedText(state.displayedText);
          setIsTyping(state.isTyping);
        });

        typeWriterRef.current.start();

        return () => {
          unsubscribe();
          typeWriterRef.current?.destroy();
        };
      }, [text, speed]);

      return (
        <span className="font-mono">
          {displayedText}
          {cursor && isTyping && (
            <span className="inline-block h-4 w-1.5 animate-pulse bg-[#fbbf24] align-middle ml-0.5" />
          )}
        </span>
      );
    };

    // ==================== 终端模拟器组件 ====================
    const TerminalSimulator = ({ mode = 'guided', steps = [], title = 'Terminal' }) => {
      const [lines, setLines] = useState([]);
      const [pendingLine, setPendingLine] = useState(null);
      const [currentStep, setCurrentStep] = useState(-1);
      const [isTyping, setIsTyping] = useState(false);
      const [isComplete, setIsComplete] = useState(false);
      const typeWriterRef = useRef(null);
      const scrollRef = useRef(null);

      const addLine = (type, text) => {
        setLines(prev => [...prev, { id: Date.now(), type, text }]);
      };

      const typeText = (type, text, speed = 30) => {
        return new Promise((resolve) => {
          setIsTyping(true);
          setPendingLine({ type, text: '' });
          typeWriterRef.current = new TypeWriterCore({
            text,
            speed,
            onComplete: () => {
              setIsTyping(false);
              setPendingLine(null);
              resolve();
            }
          });
          typeWriterRef.current.subscribe((state) => {
            setPendingLine((prev) => prev ? { ...prev, text: state.displayedText } : null);
          });
          typeWriterRef.current.start();
        });
      };

      const processStep = async (stepIndex) => {
        if (stepIndex >= steps.length) {
          setIsComplete(true);
          return;
        }

        const step = steps[stepIndex];
        setCurrentStep(stepIndex);

        // 打字输入命令
        await typeText('command', step.command, 25);
        addLine('command', step.command);

        // 打字输出
        await typeText('output', step.output, 15);
        addLine('output', step.output);
      };

      const handleStart = () => {
        setLines([]);
        setCurrentStep(0);
        setIsComplete(false);
        processStep(0);
      };

      const handleNext = () => {
        processStep(currentStep + 1);
      };

      const handleSkip = () => {
        typeWriterRef.current?.skipToEnd();
      };

      useEffect(() => {
        if (scrollRef.current) {
          scrollRef.current.scrollTop = scrollRef.current.scrollHeight;
        }
      }, [lines, pendingLine]);

      const currentStepData = steps[currentStep];

      return (
        <div className="terminal-theme-macos-dark overflow-hidden rounded-xl border border-[#44403c] shadow-2xl">
          {/* 窗口装饰 */}
          <div className="flex items-center gap-2 px-4 py-2.5 bg-[#1c1917]">
            <span className="h-3 w-3 rounded-full bg-[#ef4444]" />
            <span className="h-3 w-3 rounded-full bg-[#eab308]" />
            <span className="h-3 w-3 rounded-full bg-[#22c55e]" />
            <span className="ml-2 text-xs text-[#e7e5e4]/60 truncate">{title}</span>
          </div>

          {/* 终端内容 */}
          <div ref={scrollRef} className="overflow-y-auto bg-[#1c1917] p-4 font-mono text-sm min-h-[280px] max-h-[480px]">
            {lines.map((line) => (
              <div key={line.id} className="mb-2">
                {line.type === 'command' && (
                  <div className="flex items-start gap-2">
                    <span className="shrink-0 select-none text-[#fbbf24]">{'>'}</span>
                    <pre className="flex-1 whitespace-pre-wrap text-[#e7e5e4]">{line.text}</pre>
                  </div>
                )}
                {line.type === 'output' && (
                  <pre className="whitespace-pre-wrap text-[#d6d3d1] border-l-2 border-[#44403c] pl-3">
                    {line.text}
                  </pre>
                )}
              </div>
            ))}
            {pendingLine && (
              <div className="mb-2">
                {pendingLine.type === 'command' ? (
                  <div className="flex items-start gap-2">
                    <span className="shrink-0 select-none text-[#fbbf24]">{'>'}</span>
                    <pre className="flex-1 whitespace-pre-wrap text-[#e7e5e4]">
                      {pendingLine.text}
                      <span className="inline-block h-4 w-1.5 animate-pulse bg-[#fbbf24] align-middle ml-0.5" />
                    </pre>
                  </div>
                ) : (
                  <pre className="whitespace-pre-wrap text-[#d6d3d1] border-l-2 border-[#44403c] pl-3">
                    {pendingLine.text}
                    <span className="inline-block h-4 w-1.5 animate-pulse bg-[#fbbf24] align-middle ml-0.5" />
                  </pre>
                )}
              </div>
            )}
          </div>

          {/* 控制区 */}
          <div className="flex items-center justify-between border-t border-[#44403c] bg-[#171412] px-4 py-3">
            <div className="flex-1">
              {isComplete ? (
                <span className="text-xs text-green-400">All steps complete!</span>
              ) : isTyping ? (
                <span className="text-xs text-[#e7e5e4]/70">Running...</span>
              ) : currentStepData ? (
                <p className="text-xs text-[#e7e5e4]/70">
                  {currentStepData.description || `Step ${currentStep + 1}: ${currentStepData.command}`}
                </p>
              ) : (
                <p className="text-xs text-[#e7e5e4]/70">Click Run to start</p>
              )}
            </div>
            
            {isComplete ? (
              <button
                onClick={handleStart}
                className="min-h-[44px] rounded-lg bg-[#f59e0b] px-5 py-2 text-sm font-semibold text-white hover:opacity-90"
              >
                Reset
              </button>
            ) : isTyping ? (
              <button
                onClick={handleSkip}
                className="min-h-[44px] rounded-lg bg-[#f59e0b] px-5 py-2 text-sm font-semibold text-white hover:opacity-90"
              >
                Skip
              </button>
            ) : (
              <button
                onClick={currentStep < 0 ? handleStart : handleNext}
                className="min-h-[44px] rounded-lg bg-[#f59e0b] px-5 py-2 text-sm font-semibold text-white hover:opacity-90"
              >
                {currentStep < 0 ? 'Run' : 'Next Step'}
              </button>
            )}
          </div>
        </div>
      );
    };

    // ==================== 示例步骤 ====================
    const installSteps = [
      {
        id: 'install',
        command: 'npm install terminal-learning-kit',
        output: 'added 42 packages in 2s\n\n42 packages are looking for funding\nrun `npm fund` for details',
        description: 'Install the package'
      },
      {
        id: 'import',
        command: 'import { TerminalSimulator } from "terminal-learning-kit"',
        output: '✓ Module imported successfully',
        description: 'Import the component'
      },
      {
        id: 'usage',
        command: '<TerminalSimulator mode="guided" steps={steps} />',
        output: '✓ Component rendered\n\nYour terminal is ready!',
        description: 'Use the component'
      }
    ];

    // ==================== 主应用 ====================
    const App = () => {
      return (
        <div className="max-w-4xl mx-auto p-8">
          <h1 className="text-3xl font-bold mb-2">Terminal Learning Kit</h1>
          <p className="text-gray-400 mb-8">React 基础示例 - 引导教程模式</p>

          {/* TypeWriter 示例 */}
          <section className="mb-12">
            <h2 className="text-xl font-semibold mb-4">打字机动画</h2>
            <div className="bg-[#1c1917] rounded-lg p-4 border border-[#44403c]">
              <p className="font-mono text-[#e7e5e4]">
                <TypeWriter 
                  text="npm install terminal-learning-kit" 
                  speed={50}
                />
              </p>
            </div>
          </section>

          {/* 终端模拟器示例 */}
          <section>
            <h2 className="text-xl font-semibold mb-4">终端模拟器</h2>
            <TerminalSimulator
              mode="guided"
              steps={installSteps}
              title="Quick Start Tutorial"
            />
          </section>

          {/* 使用说明 */}
          <section className="mt-12 p-6 bg-[#1c1917] rounded-lg border border-[#44403c]">
            <h3 className="text-lg font-semibold mb-4">使用说明</h3>
            <ol className="list-decimal list-inside space-y-2 text-gray-300">
              <li>点击 <strong>Run</strong> 按钮开始教程</li>
              <li>观看命令自动输入和输出显示</li>
              <li>点击 <strong>Next Step</strong> 进入下一步</li>
              <li>点击 <strong>Skip</strong> 跳过当前动画</li>
              <li>完成后点击 <strong>Reset</strong> 重新开始</li>
            </ol>
          </section>
        </div>
      );
    };

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
